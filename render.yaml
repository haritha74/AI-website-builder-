services:
  - type: web
    name: ai-website-builder-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEYS
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-flash-latest,gemini-2.5-flash-lite,gemini-flash-lite-latest
      - key: GEMINI_TIMEOUT_SECONDS
        value: "180"
      - key: GEMINI_VERIFY_SSL
        value: "true"
      - key: FRONTEND_ORIGIN
        sync: false

  - type: static
    name: ai-website-builder
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_HOSTNAME
        fromService:
          type: web
          name: ai-website-builder-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
