services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ai_website_builder
      MYSQL_USER: builder
      MYSQL_PASSWORD: builderpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://builder:builderpassword@mysql:3306/ai_website_builder
      SECRET_KEY: local-compose-secret
      JWT_SECRET_KEY: local-compose-jwt-secret
      FRONTEND_ORIGIN: http://localhost:5173
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_FALLBACK_MODELS: ${GEMINI_FALLBACK_MODELS:-gemini-flash-latest,gemini-2.5-flash-lite,gemini-flash-lite-latest}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-180}
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
